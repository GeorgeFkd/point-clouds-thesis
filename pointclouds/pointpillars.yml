dataset:
  name: KITTI
  dataset_path: null  # Not needed for inference
  cache_dir: ./logs/cache
  
model:
  device: cpu
  name: PointPillars
  ckpt_path: ./pointpillars_kitti_202012221652utc.pth  # Set this if you have pretrained weights
  batcher: "ignore"
  point_cloud_range: [-2, -2, 0, 2,2, 2]
  classes: ['Pedestrian', 'Cyclist', 'Car']
  
  voxelize:
    max_num_points: 32
    voxel_size: &vsize [0.16, 0.16, 4]
    max_voxels: [16000, 40000]
    
  voxel_encoder:
    in_channels: 4
    feat_channels: [64]
    voxel_size: *vsize
    
  scatter:
    in_channels: 64
    output_shape: [496, 432]
    
  backbone:
    in_channels: 64
    out_channels: [64, 128, 256]
    layer_nums: [3, 5, 5]
    layer_strides: [2, 2, 2]
    
  neck:
    in_channels: [64, 128, 256]
    out_channels: [128, 128, 128]
    upsample_strides: [1, 2, 4]
    use_conv_for_no_stride: false
    
  head:
    in_channels: 384
    feat_channels: 384
    nms_pre: 100
    score_thr: 0.1
    ranges: [
      [0, -39.68, -0.6, 70.4, 39.68, -0.6],
      [0, -39.68, -0.6, 70.4, 39.68, -0.6],
      [0, -39.68, -1.78, 70.4, 39.68, -1.78]
    ]
    sizes: [[0.6, 0.8, 1.73], [0.6, 1.76, 1.73], [1.6, 3.9, 1.56]]
    rotations: [0, 1.57]
    iou_thr: [[0.35, 0.5], [0.35, 0.5], [0.45, 0.6]]
    
  # Remove augment for inference or set to empty
  augment: {}

pipeline:
  name: ObjectDetection
  test_compute_metric: false  # Don't compute metrics for inference
  batch_size: 1
  val_batch_size: 1
  test_batch_size: 1
